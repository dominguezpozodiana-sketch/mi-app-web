<!--cabecera del menu lateral-->
<header class="cabecera-menu-lateral">
  <button id="btn-menu-lateral" class="btn-menu-lateral">
    <img id="icono-abrir-menu-lateral"src="iconos/MenuLateral/boton-menu-lateral-abrir/menu1.png" alt="menu" height="30px" width="30px" background="none">
  </button>
  <div class="parte-izquierda-cabecera">
    <button class="btn-usuario-registrado">
      <img class="icono-perfil-usuario"src="iconos/MenuLateral/perfil1.png" alt="perfil" height="30px" width="30px">
    </button>
    <p class="name-usuario-cabecera-menu-lateral">rodolfitomenendezzoto</p>
  </div>
</header>

<!-- cuerpo del menu lateral-->
<div class="cuerpo-menu-lateral">
    <!--boton para seleccionar pantalla de inicio-->
  <div class="selector-inicio">
    <button id="btn-pantalla-inicio" class="btn-pantalla-inicio btn-panlla-menu-lateral" data-pantalla-menu-lateral="pantalla-estadistica" data-iconos-menu="icon-menu-lateral-inicio">
      <img id="icon-menu-lateral-inicio" class="tamano-icono" src="iconos/MenuLateral/oficina.png" alt="oficina">
      <p>Inicio</p>
    </button>
  </div>
  <!--boton para seleccionar pantalla de productos-->
  <div class="selector-inicio">
    <button id="btn-pantalla-producto" class="btn-pantalla-inicio btn-panlla-menu-lateral" data-pantalla-menu-lateral="pantalla-compra" data-iconos-menu="icon-menu-lateral-producto">
      <img id="icon-menu-lateral-producto" class="tamano-icono" src="iconos/MenuLateral/oficina.png" alt="oficina">
      <p>Productos</p>
    </button>
  </div>
</div>
